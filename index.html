<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TradeXpro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI, sans-serif;
  background:#0a0f1c;
  color:white;
  overflow:hidden;
  height: 100vh;
  position: relative;
}

/* ==========================================================================
   ADVANCED ANIMATED AUTHENTICATION OVERLAY
   ========================================================================== */
.auth-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #040814;
  z-index: 9999;
  display: flex;
  justify-content: center;
  align-items: center;
  perspective: 1000px; /* Enables 3D space for the tilt animation */
  transition: opacity 0.8s cubic-bezier(0.19, 1, 0.22, 1), visibility 0.8s;
}

/* Background Particle Canvas */
#authCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

/* Cinematic Exit Animation when Authorized */
.auth-overlay.authenticated {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.auth-overlay.authenticated .auth-card {
  animation: cinematicExit 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
}

@keyframes cinematicExit {
  0% {
    transform: scale(1) translateZ(0) rotateX(0);
    opacity: 1;
    filter: blur(0px);
  }
  100% {
    transform: scale(0.8) translateZ(300px) rotateX(20deg) translateY(-80px);
    opacity: 0;
    filter: blur(10px);
  }
}

.auth-card {
  position: relative;
  z-index: 2;
  background: rgba(10, 15, 28, 0.65);
  border: 1px solid rgba(34, 197, 94, 0.25); 
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 40px 35px;
  border-radius: 24px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 0 40px rgba(34, 197, 94, 0.1), 0 30px 60px rgba(0, 0, 0, 0.8);
  text-align: center;
  transform-style: preserve-3d; /* Smooth 3D rendering */
  transition: border-color 0.4s, box-shadow 0.4s;
}

/* Entrance fade-in slide up */
.auth-card {
  animation: cardEntrance 1s cubic-bezier(0.19, 1, 0.22, 1) backwards;
}

@keyframes cardEntrance {
  0% { transform: translateY(30px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.auth-card:focus-within {
  border-color: #22c55e;
  box-shadow: 0 0 50px rgba(34, 197, 94, 0.2), 0 30px 60px rgba(0, 0, 0, 0.9);
}

.auth-brand {
  font-size: 36px;
  font-weight: 700;
  color: #22c55e;
  letter-spacing: 0.5px;
  margin-bottom: 15px;
  text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
  transform: translateZ(30px); /* Pushes text forward in 3D layers */
}

.auth-logo-img {
  width: 110px;
  height: 110px;
  object-fit: cover;
  border-radius: 22px;
  margin: 0 auto 25px auto;
  display: block;
  box-shadow: 0 0 25px rgba(34, 197, 94, 0.4);
  transform: translateZ(45px); /* Highest 3D layer pop */
}

.auth-group {
  margin-bottom: 18px;
  text-align: left;
  transform: translateZ(20px);
}

.auth-group label {
  display: block;
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 6px;
  padding-left: 2px;
}

.auth-group input {
  width: 100%;
  padding: 12px 14px;
  background: rgba(2, 6, 23, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: white;
  outline: none;
  font-size: 14px;
  transition: all 0.3s ease;
}

.auth-group input:focus {
  border-color: #22c55e;
  box-shadow: 0 0 12px rgba(34, 197, 94, 0.25);
  background: #020617;
}

/* Dynamic Buttons */
.auth-btn-primary {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: white;
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
  transform: translateZ(25px);
}

.auth-btn-primary:hover {
  transform: translateZ(30px) scale(1.02);
  box-shadow: 0 0 25px rgba(34, 197, 94, 0.6);
}

.auth-btn-secondary {
  background: transparent;
  color: #ef4444;
  width: 100%;
  padding: 12px;
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 10px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
  transform: translateZ(20px);
}

.auth-btn-secondary:hover {
  background: rgba(239, 68, 68, 0.08);
  border-color: #ef4444;
  transform: translateZ(20px) scale(1.02);
}

.hidden {
  display: none !important;
}

/* ==========================================================================
   ORIGINAL APP PANEL CSS
   ========================================================================== */
header{
  height:60px;
  background:#020617;
  border-bottom:1px solid #1e293b;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}

.logo{
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
}

.status{
  color:#22c55e;
  font-size:13px;
}

.main{
  display:grid;
  grid-template-columns:2fr 1fr;
  height:calc(100vh - 60px);
}

#chart{
  height:100%;
}

.panel{
  background:#020617;
  border-left:1px solid #1e293b;
  padding:14px;
  overflow:auto;
}

.card{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:12px;
  padding:14px;
  margin-bottom:14px;
}

.card-title{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:10px;
}

select, input:not(.auth-group input) {
  width:100%;
  padding:11px;
  margin-top:8px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:8px;
  color:white;
}

button:not(.auth-card button) {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:not(.auth-card button):hover{
  transform:scale(1.02);
}

.buy{
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
}

.sell{
  background:linear-gradient(135deg,#dc2626,#ef4444);
  color:white;
}

.stat{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:14px;
}

.green{
  color:#22c55e;
}

.red{
  color:#ef4444;
}

.list{
  max-height:180px;
  overflow:auto;
  font-size:12px;
}

.trade{
  padding:8px;
  border-bottom:1px solid #1e293b;
}

.signal-box{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
}

.footer{
  text-align:center;
  color:#64748b;
  font-size:11px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="auth-overlay" id="authOverlay">
  <canvas id="authCanvas"></canvas>
  
  <div class="auth-card" id="loginCard">
    <div class="auth-brand">TradeXpro</div>
    <img src="trade.jpg" alt="TradeXpro Logo" class="auth-logo-img">
    
    <form id="loginForm">
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" required placeholder="name@domain.com">
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="auth-btn-primary">Log In</button>
      <button type="button" class="auth-btn-secondary" id="showRegister">Sign Up</button>
    </form>
  </div>

  <div class="auth-card hidden" id="registerCard">
    <div class="auth-brand">TradeXpro</div>
    <img src="trade.jpg" alt="TradeXpro Logo" class="auth-logo-img">
    
    <form id="registerForm">
      <div class="auth-group">
        <label>Full Name</label>
        <input type="text" id="regName" required placeholder="John Doe">
      </div>
      <div class="auth-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" required placeholder="name@domain.com">
      </div>
      <div class="auth-group">
        <label>Password</label>
        <input type="password" id="regPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="auth-btn-primary">Create Account</button>
      <button type="button" class="auth-btn-secondary" id="showLogin">Back to Log In</button>
    </form>
  </div>
</div>

<header>
  <div class="logo">
    <img src="trade.jpg" alt="TradeXpro Logo" style="
         width:45px;
         height:45px;
         object-fit:cover;
         border-radius:10px;
         margin-right:10px;
         vertical-align:middle;
         box-shadow:0 0 15px #22c55e;
         ">
    <span style="vertical-align:middle; font-size:20px; font-weight:bold; color:#38bdf8;">
      TradeXpro
    </span>
  </div>
  <div class="status">🟢 MARKET ACTIVE</div>
</header>

<div class="main">
  <div id="chart"></div>

  <div class="panel">
    <div class="card">
      <div class="card-title">📊 Select Market</div>
      <select id="symbol" onchange="loadChart()">
        <option value="BINANCE:BTCUSD">₿ BTC / USD</option>
        <option value="BINANCE:ETHUSDT">Ξ ETH / USDT</option>
        <option value="NSE:NIFTY">🇮🇳 NIFTY 50</option>
        <option value="NASDAQ:AAPL">🍎 APPLE</option>
        <option value="NASDAQ:TSLA">🚗 TESLA</option>
        <option value="FX:EURUSD">💱 EUR / USD</option>
      </select>
      <input id="qty" placeholder="Enter Position Size">
      <input id="sl" placeholder="Risk Limit (SL)">
      <input id="tp" placeholder="Profit Target">
      <button class="buy" onclick="buy()">BUY</button>
      <button class="sell" onclick="sell()">SELL</button>
    </div>

    <div class="card">
      <div class="card-title">💼 Portfolio Overview</div>
      <div class="stat">
        <span>💎 Portfolio Value</span>
        <span id="bal">₹10000</span>
      </div>
      <div class="stat">
        <span>📈 Trade Result</span>
        <span id="pl">₹0</span>
      </div>
      <div class="stat">
        <span>🏆 Accuracy</span>
        <span id="wr">0%</span>
      </div>
      <div class="stat">
        <span>⚡ Total Positions</span>
        <span id="trades">0</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📑 Trade Journal</div>
      <div class="list" id="history"></div>
    </div>

    <div class="card">
      <div class="card-title">📡 Market Bias</div>
      <div class="signal-box" id="signal">WAIT</div>
    </div>

    <div class="footer">Paper Trading Simulator • Educational Purpose Only</div>
  </div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// ==========================================================================
// BACKGROUND CANVAS PARTICLES GRID ANIMATION (NEW)
// ==========================================================================
const canvas = document.getElementById("authCanvas");
const ctx = canvas.getContext("2d");

let particles = [];
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.speedY = (Math.random() - 0.5) * 0.5;
    this.color = Math.random() > 0.5 ? "rgba(34, 197, 94, 0.25)" : "rgba(239, 68, 68, 0.15)";
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
  }
  draw() {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 75; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();


// ==========================================================================
// 3D PARALLAX MOUSE TILT INTERACTION EFFECT (NEW)
// ==========================================================================
const cards = document.querySelectorAll(".auth-card");
document.addEventListener("mousemove", (e) => {
  const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
  const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
  
  cards.forEach(card => {
    if (!card.classList.contains("hidden")) {
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
    }
  });
});

// Reset positioning angles smoothly when mouse exits window boundaries
document.addEventListener("mouseleave", () => {
  cards.forEach(card => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
  });
});


// ==========================================================================
// REGISTRATION AND SECURITY CONTROL ROUTINES
// ==========================================================================
const authOverlay = document.getElementById("authOverlay");
const loginCard = document.getElementById("loginCard");
const registerCard = document.getElementById("registerCard");

document.getElementById("showRegister").addEventListener("click", () => {
  loginCard.classList.add("hidden");
  registerCard.classList.remove("hidden");
});

document.getElementById("showLogin").addEventListener("click", () => {
  registerCard.classList.add("hidden");
  loginCard.classList.remove("hidden");
});

document.getElementById("registerForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const name = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const password = document.getElementById("regPassword").value;

  let clients = JSON.parse(localStorage.getItem("tradeXpro_clients")) || [];

  if (clients.some(client => client.email === email)) {
    alert("⚠️ This email registry is already active.");
    return;
  }

  clients.push({ name, email, password });
  localStorage.setItem("tradeXpro_clients", JSON.stringify(clients));

  alert(`Registration successful! Welcome, ${name}.`);
  document.getElementById("registerForm").reset();
  document.getElementById("showLogin").click();
});

document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;

  let clients = JSON.parse(localStorage.getItem("tradeXpro_clients")) || [];
  const validClient = clients.find(client => client.email === email && client.password === password);

  if (validClient) {
    authOverlay.classList.add("authenticated");
    setTimeout(() => {
      loadChart();
    }, 700); // Wait for the transition scale animations to clear viewport
  } else {
    alert("⚠️ Access Denied: Invalid credentials.");
  }
});


// ==========================================================================
// CORE TRADING APPLICATION FLOW
// ==========================================================================
let balance = Number(localStorage.getItem("bal")) || 10000;
let wins = 0;
let loss = 0;
let totalTrades = 0;
let entry = 0;
let qty = 0;
let position = false;

document.getElementById("bal").innerText = "₹" + balance;

function loadChart(){
  document.getElementById("chart").innerHTML="";
  new TradingView.widget({
    autosize:true,
    symbol:document.getElementById("symbol").value,
    interval:"15",
    theme:"dark",
    style:"1",
    toolbar_bg:"#020617",
    enable_publishing:false,
    hide_top_toolbar:false,
    allow_symbol_change:true,
    studies:[
      "RSI@tv-basicstudies",
      "MASimple@tv-basicstudies"
    ],
    container_id:"chart"
  });
}

function price(){
  return Math.floor(Math.random()*100)+100;
}

function signal(){
  let r=Math.random()*100;
  if(r<30) return "🟢 BULLISH";
  if(r>70) return "🔴 BEARISH";
  return "🟡 SIDEWAYS";
}

function buy(){
  if(position){
    alert("⚠️ Position already active");
    return;
  }
  let q=document.getElementById("qty").value;
  if(q==="" || Number(q)<=0){
    alert("Enter valid quantity");
    return;
  }
  qty=Number(q);
  if(qty>50){
    alert("⚠️ High Risk Position");
  }
  entry=price();
  position=true;
  document.getElementById("signal").innerText = "🟢 ENTERED @ ₹" + entry;
}

function sell(){
  if(!position){
    alert("⚠️ No active position");
    return;
  }
  let exit=price();
  let profit=(exit-entry)*qty;
  balance += profit;
  localStorage.setItem("bal",balance);

  document.getElementById("bal").innerText = "₹" + balance;
  document.getElementById("pl").innerText = "₹" + profit;
  document.getElementById("pl").className = profit>=0 ? "green" : "red";

  totalTrades++;
  if(profit>0){
    wins++;
  }else{
    loss++;
  }

  let wr=((wins/totalTrades)*100).toFixed(1);
  document.getElementById("wr").innerText = wr + "%";
  document.getElementById("trades").innerText = totalTrades;
  document.getElementById("signal").innerText = signal();

  saveTrade(entry,exit,profit);
  position=false;
}

function saveTrade(e,x,p){
  let t=JSON.parse(localStorage.getItem("trades")) || [];
  t.push({e,x,p});
  localStorage.setItem("trades",JSON.stringify(t));
  addHistory(e,x,p);
}

function loadHistory(){
  let t=JSON.parse(localStorage.getItem("trades")) || [];
  t.forEach(v=>addHistory(v.e,v.x,v.p));
}

function addHistory(e,x,p){
  let d=document.createElement("div");
  d.className="trade";
  d.innerHTML= `
    ENTRY ₹${e}<br>
    EXIT ₹${x}<br>
    <span class="${p>=0?'green':'red'}">P&L : ₹${p}</span>
  `;
  document.getElementById("history").prepend(d);
}

loadHistory();
</script>

</body>
</html>
